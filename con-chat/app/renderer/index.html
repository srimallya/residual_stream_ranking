<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>con-chat</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23f2eee7'/%3E%3Ccircle cx='20' cy='22' r='7' fill='%23111318'/%3E%3Ccircle cx='43' cy='20' r='6' fill='%23f3ba67'/%3E%3Ccircle cx='34' cy='44' r='8' fill='%236fd48d'/%3E%3Cpath d='M20 22L43 20L34 44' stroke='%23111318' stroke-width='3.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css?v=20260420d" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>con-chat</h1>
      </header>

      <main class="workspace">
        <section class="chat-panel">
          <div class="thread" id="thread"></div>

          <form class="composer" id="composer">
            <textarea id="composer-input" rows="1" placeholder="Message con-chat..."></textarea>
            <button type="submit" class="send-button" id="composer-submit">Send</button>
          </form>
        </section>

        <aside class="graph-rail">
          <div class="graph-stage" id="graph-stage">
            <svg id="memory-graph" viewBox="0 0 320 720" class="graph-canvas" aria-label="Conversation memory graph"></svg>
            <div class="graph-tooltip" id="graph-tooltip" role="status" aria-live="polite"></div>
          </div>
        </aside>
      </main>
    </div>
    <script src="./app.js?v=20260420d"></script>
  </body>
</html>
