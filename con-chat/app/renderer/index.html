<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>con-chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>con-chat</h1>
      </header>

      <main class="workspace">
        <section class="chat-panel">
          <div class="thread" id="thread"></div>

          <form class="composer" id="composer">
            <textarea id="composer-input" rows="1" placeholder="Message con-chat..."></textarea>
            <button type="submit" class="send-button">Send</button>
          </form>
        </section>

        <aside class="graph-rail">
          <div class="graph-toolbar">
            <span>Graph</span>
            <div class="graph-controls">
              <button type="button" class="graph-button" id="conversation-reset" aria-label="Reset conversation">Reset</button>
            </div>
          </div>
          <div class="graph-stage" id="graph-stage">
            <svg id="memory-graph" viewBox="0 0 320 720" class="graph-canvas" aria-label="Conversation memory graph"></svg>
          </div>
        </aside>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
